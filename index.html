<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>Shop Attendance Tracker</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
  :root{
    --bg:#f4f6f8; --card:#fff; --ink:#1a2733; --muted:#6b7a89;
    --green:#1e9e5a; --red:#d64545; --blue:#2a6fdb; --border:#e2e8ee;
  }
  *{box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent;}
  body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif; background:var(--bg); color:var(--ink);}
  header{background:var(--card); padding:14px 16px; display:flex; align-items:center; justify-content:space-between; border-bottom:1px solid var(--border); position:sticky; top:0; z-index:10;}
  header h1{font-size:18px;}
  #clock{font-size:14px; color:var(--muted); font-variant-numeric:tabular-nums;}
  nav{display:flex; background:var(--card); border-bottom:1px solid var(--border);}
  nav button{flex:1; padding:12px 4px; border:none; background:none; font-size:14px; color:var(--muted); border-bottom:3px solid transparent; cursor:pointer;}
  nav button.active{color:var(--blue); border-bottom-color:var(--blue); font-weight:600;}
  main{padding:16px; max-width:900px; margin:0 auto;}
  .card{background:var(--card); border:1px solid var(--border); border-radius:12px; padding:16px; margin-bottom:14px;}
  .emp-grid{display:grid; grid-template-columns:repeat(auto-fill,minmax(150px,1fr)); gap:12px;}
  .emp-tile{background:var(--card); border:1px solid var(--border); border-radius:12px; padding:16px 12px; text-align:center; cursor:pointer; box-shadow:0 1px 3px rgba(0,0,0,.05);}
  .emp-tile:active{transform:scale(.97);}
  .emp-tile .name{font-weight:600; font-size:16px; margin-bottom:6px;}
  .emp-tile .status{font-size:13px; color:var(--muted);}
  .emp-tile.in{border-color:var(--green);}
  .emp-tile.in .status{color:var(--green); font-weight:600;}
  .btn{display:inline-block; border:none; border-radius:10px; padding:12px 20px; font-size:15px; font-weight:600; cursor:pointer; color:#fff; background:var(--blue);}
  .btn.green{background:var(--green);} .btn.red{background:var(--red);}
  .btn.ghost{background:none; color:var(--blue); border:1px solid var(--blue);}
  .btn.small{padding:6px 12px; font-size:13px; border-radius:8px;}
  .btn:disabled{opacity:.5;}
  /* camera modal */
  #camModal{position:fixed; inset:0; background:rgba(0,0,0,.85); display:none; flex-direction:column; align-items:center; justify-content:center; z-index:100; padding:16px;}
  #camModal.open{display:flex;}
  #camModal h2{color:#fff; margin-bottom:12px; font-size:18px; text-align:center;}
  #video{width:100%; max-width:420px; border-radius:12px; background:#000; transform:scaleX(-1);}
  #camBtns{margin-top:16px; display:flex; gap:12px;}
  #camError{color:#ffb3b3; margin-top:10px; text-align:center; font-size:14px;}
  table{width:100%; border-collapse:collapse; font-size:14px;}
  th,td{padding:8px 6px; border-bottom:1px solid var(--border); text-align:left;}
  th{color:var(--muted); font-weight:600; font-size:12px; text-transform:uppercase;}
  td.num, th.num{text-align:right; font-variant-numeric:tabular-nums;}
  .photo-thumb{width:44px; height:44px; object-fit:cover; border-radius:8px; cursor:pointer; background:#ddd;}
  input[type=text], input[type=month], input[type=date], input[type=time]{padding:10px; border:1px solid var(--border); border-radius:8px; font-size:15px; width:100%;}
  .row{display:flex; gap:10px; align-items:center; flex-wrap:wrap;}
  .row > *{flex:0 0 auto;}
  .grow{flex:1 1 auto !important;}
  .muted{color:var(--muted); font-size:13px;}
  .open-session{color:var(--green); font-weight:600;}
  .missing{color:var(--red); font-weight:600;}
  #photoView{position:fixed; inset:0; background:rgba(0,0,0,.9); display:none; align-items:center; justify-content:center; z-index:110; cursor:pointer;}
  #photoView.open{display:flex;}
  #photoView img{max-width:92%; max-height:92%; border-radius:12px;}
  #reportTableWrap{overflow-x:auto;}
  #reportTable th, #reportTable td{white-space:nowrap;}
  .toast{position:fixed; bottom:24px; left:50%; transform:translateX(-50%); background:var(--ink); color:#fff; padding:12px 22px; border-radius:10px; font-size:15px; z-index:120; opacity:0; transition:opacity .25s; pointer-events:none;}
  .toast.show{opacity:1;}
  h3{font-size:16px; margin-bottom:10px;}
</style>
</head>
<body>

<header>
  <h1>Shop Attendance</h1>
  <div id="clock"></div>
</header>

<nav>
  <button data-tab="home" class="active">Clock In/Out</button>
  <button data-tab="records">Records</button>
  <button data-tab="report">Monthly Report</button>
  <button data-tab="employees">Employees</button>
</nav>

<main>
  <!-- HOME -->
  <section id="tab-home">
    <p class="muted" style="margin-bottom:12px">Tap your name to clock in or out. Your photo will be captured.</p>
    <div class="emp-grid" id="empGrid"></div>
    <p class="muted" id="homeEmpty" style="display:none; margin-top:10px">No employees yet — add them in the Employees tab.</p>
  </section>

  <!-- RECORDS -->
  <section id="tab-records" style="display:none">
    <div class="card">
      <div class="row">
        <label class="muted">Date</label>
        <input type="date" id="recDate" style="width:auto">
      </div>
    </div>
    <div class="card">
      <table id="recTable">
        <thead><tr><th>Employee</th><th>In</th><th>Photo</th><th>Out</th><th>Photo</th><th class="num">Hours</th><th></th></tr></thead>
        <tbody></tbody>
      </table>
      <p class="muted" id="recEmpty" style="display:none; margin-top:8px">No records for this date.</p>
    </div>
  </section>

  <!-- REPORT -->
  <section id="tab-report" style="display:none">
    <div class="card">
      <div class="row">
        <label class="muted">Month</label>
        <input type="month" id="repMonth" style="width:auto">
        <button class="btn small" id="btnExport">Download Excel</button>
      </div>
    </div>
    <div class="card" id="reportTableWrap">
      <table id="reportTable"><thead></thead><tbody></tbody></table>
      <p class="muted" id="repEmpty" style="display:none; margin-top:8px">No data for this month.</p>
    </div>
  </section>

  <!-- EMPLOYEES -->
  <section id="tab-employees" style="display:none">
    <div class="card">
      <h3>Add employee</h3>
      <div class="row">
        <input type="text" id="newEmpName" class="grow" placeholder="Employee name" maxlength="40">
        <button class="btn green" id="btnAddEmp">Add</button>
      </div>
    </div>
    <div class="card">
      <h3>Employees</h3>
      <table id="empTable"><tbody></tbody></table>
      <p class="muted" id="empEmpty" style="display:none">No employees added yet.</p>
    </div>
  </section>
</main>

<!-- Camera modal -->
<div id="camModal">
  <h2 id="camTitle"></h2>
  <video id="video" autoplay playsinline muted></video>
  <div id="camBtns">
    <button class="btn green" id="btnCapture">📷 Capture</button>
    <button class="btn red" id="btnCamCancel">Cancel</button>
  </div>
  <p id="camError"></p>
</div>

<!-- Photo viewer -->
<div id="photoView" onclick="this.classList.remove('open')"><img id="photoViewImg" alt="attendance photo"></div>

<div class="toast" id="toast"></div>

<script>
'use strict';
/* ---------- storage ---------- */
const LS_EMP = 'att_employees', LS_REC = 'att_records';
const load = (k) => JSON.parse(localStorage.getItem(k) || '[]');
const save = (k, v) => localStorage.setItem(k, JSON.stringify(v));
let employees = load(LS_EMP);   // {id, name, active}
let records   = load(LS_REC);   // {id, empId, date:'YYYY-MM-DD', in:ms, out:ms|null, inPhoto, outPhoto}

/* IndexedDB for photos */
let db;
const dbReady = new Promise((res, rej) => {
  const rq = indexedDB.open('att_photos', 1);
  rq.onupgradeneeded = () => rq.result.createObjectStore('photos', {keyPath:'id'});
  rq.onsuccess = () => { db = rq.result; res(); };
  rq.onerror  = () => rej(rq.error);
});
async function putPhoto(id, dataUrl){
  await dbReady;
  return new Promise((res, rej) => {
    const tx = db.transaction('photos','readwrite');
    tx.objectStore('photos').put({id, dataUrl});
    tx.oncomplete = res; tx.onerror = () => rej(tx.error);
  });
}
async function getPhoto(id){
  if(!id) return null;
  await dbReady;
  return new Promise((res) => {
    const rq = db.transaction('photos').objectStore('photos').get(id);
    rq.onsuccess = () => res(rq.result ? rq.result.dataUrl : null);
    rq.onerror = () => res(null);
  });
}

/* ---------- helpers ---------- */
const uid = () => Date.now().toString(36) + Math.random().toString(36).slice(2,7);
const pad = n => String(n).padStart(2,'0');
const dateStr = (d=new Date()) => `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;
const fmtTime = ms => ms ? new Date(ms).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'}) : '—';
function fmtHours(h){
  if(h == null) return '—';
  const m = Math.round(h*60), hh = Math.floor(m/60), mm = m%60;
  return `${hh}:${pad(mm)}`;
}
function recHours(r){ return r.out ? Math.max(0,(r.out - r.in)/3600000) : null; }
function openSession(empId){ return records.find(r => r.empId === empId && !r.out); }
function toast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2600);
}

/* ---------- tabs ---------- */
document.querySelectorAll('nav button').forEach(b => b.onclick = () => {
  document.querySelectorAll('nav button').forEach(x => x.classList.remove('active'));
  b.classList.add('active');
  ['home','records','report','employees'].forEach(t =>
    document.getElementById('tab-'+t).style.display = (t === b.dataset.tab) ? '' : 'none');
  if(b.dataset.tab === 'records') renderRecords();
  if(b.dataset.tab === 'report') renderReport();
  if(b.dataset.tab === 'employees') renderEmployees();
});

/* ---------- live clock ---------- */
setInterval(() => {
  document.getElementById('clock').textContent = new Date().toLocaleString([], {weekday:'short', day:'numeric', month:'short', hour:'2-digit', minute:'2-digit', second:'2-digit'});
}, 1000);

/* ---------- home ---------- */
function renderHome(){
  const grid = document.getElementById('empGrid');
  grid.innerHTML = '';
  const active = employees.filter(e => e.active !== false);
  document.getElementById('homeEmpty').style.display = active.length ? 'none' : '';
  active.forEach(e => {
    const open = openSession(e.id);
    const div = document.createElement('div');
    div.className = 'emp-tile' + (open ? ' in' : '');
    div.innerHTML = `<div class="name"></div><div class="status">${open ? 'IN since ' + fmtTime(open.in) + '<br>Tap to clock OUT' : 'Tap to clock IN'}</div>`;
    div.querySelector('.name').textContent = e.name;
    div.onclick = () => startCapture(e);
    grid.appendChild(div);
  });
}

/* ---------- camera ---------- */
let stream = null, pendingEmp = null;
async function startCapture(emp){
  pendingEmp = emp;
  const open = openSession(emp.id);
  document.getElementById('camTitle').textContent = `${emp.name} — Clock ${open ? 'OUT' : 'IN'}`;
  document.getElementById('camError').textContent = '';
  document.getElementById('camModal').classList.add('open');
  document.getElementById('btnCapture').disabled = true;
  try{
    stream = await navigator.mediaDevices.getUserMedia({video:{facingMode:'user', width:{ideal:640}}, audio:false});
    document.getElementById('video').srcObject = stream;
    document.getElementById('btnCapture').disabled = false;
  }catch(err){
    document.getElementById('camError').textContent = 'Camera unavailable: ' + err.message + '. Check camera permission (page must be opened via https:// or file://, not plain http).';
  }
}
function stopCam(){
  if(stream){ stream.getTracks().forEach(t => t.stop()); stream = null; }
  document.getElementById('camModal').classList.remove('open');
  pendingEmp = null;
}
document.getElementById('btnCamCancel').onclick = stopCam;
document.getElementById('btnCapture').onclick = async () => {
  if(!pendingEmp || !stream) return;
  const video = document.getElementById('video');
  const c = document.createElement('canvas');
  const scale = 320 / video.videoWidth;
  c.width = 320; c.height = Math.round(video.videoHeight * scale);
  c.getContext('2d').drawImage(video, 0, 0, c.width, c.height);
  const dataUrl = c.toDataURL('image/jpeg', 0.7);
  const photoId = uid();
  await putPhoto(photoId, dataUrl);

  const emp = pendingEmp, now = Date.now(), open = openSession(emp.id);
  if(open){
    open.out = now; open.outPhoto = photoId;
    save(LS_REC, records);
    toast(`${emp.name} clocked OUT — ${fmtHours(recHours(open))} hrs today`);
  }else{
    records.push({id:uid(), empId:emp.id, date:dateStr(), in:now, out:null, inPhoto:photoId, outPhoto:null});
    save(LS_REC, records);
    toast(`${emp.name} clocked IN at ${fmtTime(now)}`);
  }
  stopCam();
  renderHome();
};

/* ---------- employees ---------- */
document.getElementById('btnAddEmp').onclick = () => {
  const inp = document.getElementById('newEmpName');
  const name = inp.value.trim();
  if(!name) return;
  employees.push({id:uid(), name, active:true});
  save(LS_EMP, employees);
  inp.value = '';
  renderEmployees(); renderHome();
};
function renderEmployees(){
  const tb = document.querySelector('#empTable tbody');
  tb.innerHTML = '';
  document.getElementById('empEmpty').style.display = employees.length ? 'none' : '';
  employees.forEach(e => {
    const tr = document.createElement('tr');
    const tdName = document.createElement('td');
    tdName.textContent = e.name + (e.active === false ? ' (inactive)' : '');
    const tdBtns = document.createElement('td');
    tdBtns.style.textAlign = 'right';
    const bRen = document.createElement('button');
    bRen.className = 'btn small ghost'; bRen.textContent = 'Rename';
    bRen.onclick = () => {
      const n = prompt('New name', e.name);
      if(n && n.trim()){ e.name = n.trim(); save(LS_EMP, employees); renderEmployees(); renderHome(); }
    };
    const bTog = document.createElement('button');
    bTog.className = 'btn small ' + (e.active === false ? 'green' : 'red');
    bTog.style.marginLeft = '8px';
    bTog.textContent = e.active === false ? 'Activate' : 'Deactivate';
    bTog.onclick = () => { e.active = e.active === false; save(LS_EMP, employees); renderEmployees(); renderHome(); };
    tdBtns.append(bRen, bTog);
    tr.append(tdName, tdBtns);
    tb.appendChild(tr);
  });
}

/* ---------- records ---------- */
const recDate = document.getElementById('recDate');
recDate.value = dateStr();
recDate.onchange = renderRecords;
async function showPhoto(id){
  const url = await getPhoto(id);
  if(!url) return toast('Photo not found');
  document.getElementById('photoViewImg').src = url;
  document.getElementById('photoView').classList.add('open');
}
async function renderRecords(){
  const tb = document.querySelector('#recTable tbody');
  tb.innerHTML = '';
  const day = recDate.value;
  const list = records.filter(r => r.date === day).sort((a,b) => a.in - b.in);
  document.getElementById('recEmpty').style.display = list.length ? 'none' : '';
  for(const r of list){
    const emp = employees.find(e => e.id === r.empId);
    const tr = document.createElement('tr');

    const tdName = document.createElement('td');
    tdName.textContent = emp ? emp.name : '?';

    const tdIn = document.createElement('td'); tdIn.textContent = fmtTime(r.in);
    const tdInP = document.createElement('td');
    if(r.inPhoto){
      const img = document.createElement('img');
      img.className = 'photo-thumb';
      getPhoto(r.inPhoto).then(u => { if(u) img.src = u; });
      img.onclick = () => showPhoto(r.inPhoto);
      tdInP.appendChild(img);
    }
    const tdOut = document.createElement('td');
    if(r.out) tdOut.textContent = fmtTime(r.out);
    else { tdOut.innerHTML = '<span class="open-session">still IN</span>'; }
    const tdOutP = document.createElement('td');
    if(r.outPhoto){
      const img = document.createElement('img');
      img.className = 'photo-thumb';
      getPhoto(r.outPhoto).then(u => { if(u) img.src = u; });
      img.onclick = () => showPhoto(r.outPhoto);
      tdOutP.appendChild(img);
    }
    const tdH = document.createElement('td');
    tdH.className = 'num'; tdH.textContent = fmtHours(recHours(r));

    const tdEdit = document.createElement('td');
    tdEdit.style.textAlign = 'right';
    const bEdit = document.createElement('button');
    bEdit.className = 'btn small ghost'; bEdit.textContent = 'Edit';
    bEdit.onclick = () => editRecord(r);
    const bDel = document.createElement('button');
    bDel.className = 'btn small red'; bDel.style.marginLeft = '6px'; bDel.textContent = '✕';
    bDel.onclick = () => {
      if(confirm('Delete this record?')){
        records = records.filter(x => x.id !== r.id);
        save(LS_REC, records); renderRecords(); renderHome();
      }
    };
    tdEdit.append(bEdit, bDel);
    tr.append(tdName, tdIn, tdInP, tdOut, tdOutP, tdH, tdEdit);
    tb.appendChild(tr);
  }
}
function editRecord(r){
  const inT = prompt('IN time (HH:MM, 24h)', new Date(r.in).toTimeString().slice(0,5));
  if(inT === null) return;
  const outCur = r.out ? new Date(r.out).toTimeString().slice(0,5) : '';
  const outT = prompt('OUT time (HH:MM, 24h) — leave empty if still in', outCur);
  if(outT === null) return;
  const mk = (t) => {
    const m = /^(\d{1,2}):(\d{2})$/.exec(t.trim());
    if(!m) return null;
    const d = new Date(r.date + 'T00:00:00');
    d.setHours(+m[1], +m[2], 0, 0);
    return d.getTime();
  };
  const inMs = mk(inT);
  if(inMs === null) return toast('Invalid IN time');
  let outMs = null;
  if(outT.trim() !== ''){
    outMs = mk(outT);
    if(outMs === null) return toast('Invalid OUT time');
    if(outMs < inMs) outMs += 86400000; // overnight shift
  }
  r.in = inMs; r.out = outMs;
  save(LS_REC, records); renderRecords(); renderHome();
}

/* ---------- monthly report ---------- */
const repMonth = document.getElementById('repMonth');
repMonth.value = dateStr().slice(0,7);
repMonth.onchange = renderReport;

function monthData(){
  const ym = repMonth.value; // YYYY-MM
  const [y, m] = ym.split('-').map(Number);
  const days = new Date(y, m, 0).getDate();
  const emps = employees.filter(e =>
    e.active !== false || records.some(r => r.date.startsWith(ym) && r.empId === e.id));
  // hours[empId][day] = total hours that day (null if no record, -1 if open session)
  const hours = {};
  emps.forEach(e => hours[e.id] = Array(days+1).fill(null));
  records.filter(r => r.date.startsWith(ym)).forEach(r => {
    if(!hours[r.empId]) return;
    const d = Number(r.date.slice(8,10));
    const h = recHours(r);
    if(h === null){ if(hours[r.empId][d] === null) hours[r.empId][d] = -1; }
    else hours[r.empId][d] = (hours[r.empId][d] === null || hours[r.empId][d] === -1 ? 0 : hours[r.empId][d]) + h;
  });
  return {ym, y, m, days, emps, hours};
}

function renderReport(){
  const {days, emps, hours, ym} = monthData();
  const thead = document.querySelector('#reportTable thead');
  const tbody = document.querySelector('#reportTable tbody');
  const hasData = records.some(r => r.date.startsWith(ym));
  document.getElementById('repEmpty').style.display = hasData ? 'none' : '';
  let h = '<tr><th>Employee</th>';
  for(let d=1; d<=days; d++) h += `<th class="num">${d}</th>`;
  h += '<th class="num">Days</th><th class="num">Total hrs</th></tr>';
  thead.innerHTML = h;
  tbody.innerHTML = '';
  emps.forEach(e => {
    let total = 0, daysWorked = 0, row = '';
    for(let d=1; d<=days; d++){
      const v = hours[e.id][d];
      if(v === null) row += '<td class="num muted">·</td>';
      else if(v === -1) row += '<td class="num open-session">IN</td>';
      else { total += v; daysWorked++; row += `<td class="num">${fmtHours(v)}</td>`; }
    }
    const tr = document.createElement('tr');
    const tdN = document.createElement('td'); tdN.textContent = e.name;
    tr.appendChild(tdN);
    tr.insertAdjacentHTML('beforeend', row + `<td class="num"><b>${daysWorked}</b></td><td class="num"><b>${fmtHours(total)}</b></td>`);
    tbody.appendChild(tr);
  });
}

document.getElementById('btnExport').onclick = () => {
  const {days, emps, hours, ym} = monthData();
  const header = ['Employee', ...Array.from({length:days}, (_,i) => `${ym}-${pad(i+1)}`), 'Days worked', 'Total hours'];
  const rows = emps.map(e => {
    let total = 0, daysWorked = 0;
    const cells = [];
    for(let d=1; d<=days; d++){
      const v = hours[e.id][d];
      if(v === null) cells.push('');
      else if(v === -1) cells.push('IN (no out)');
      else { total += v; daysWorked++; cells.push(Number(v.toFixed(2))); }
    }
    return [e.name, ...cells, daysWorked, Number(total.toFixed(2))];
  });
  if(typeof XLSX !== 'undefined'){
    const ws = XLSX.utils.aoa_to_sheet([header, ...rows]);
    ws['!cols'] = [{wch:18}, ...Array(days).fill({wch:10}), {wch:11}, {wch:11}];
    const wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws, ym);
    XLSX.writeFile(wb, `attendance-${ym}.xlsx`);
  }else{
    // offline fallback: CSV (opens in Excel)
    const csv = [header, ...rows].map(r => r.map(c => `"${String(c).replace(/"/g,'""')}"`).join(',')).join('\n');
    const a = document.createElement('a');
    a.href = URL.createObjectURL(new Blob([csv], {type:'text/csv'}));
    a.download = `attendance-${ym}.csv`;
    a.click();
    toast('Offline — exported CSV instead of Excel');
  }
};

/* ---------- init ---------- */
renderHome();
</script>
</body>
</html>
